<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

@import url(https://fonts.googleapis.com/css?family=Lato:300italic);

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
font-family:Arial;
}

/* pages */

.page{
width:100%;
height:100vh;
position:absolute;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* ---------------- PAGE 1 ---------------- */

#page1{
background:#ee9ca7;
}

.name{
font-size:1.1rem;
font-weight:600;
}

#cake{
display:block;
position:relative;
margin:-10em auto 0 auto;
}

/* candle */

.cake{
background:#ffffff;
border-radius:10px;
position:absolute;
top:228px;
left:50%;
margin-left:-2.4px;
margin-top:-8.3px;
width:5px;
height:35px;
transform:translateY(-300px);
animation:in 500ms 2s ease-out forwards;
}

.cake:after,.cake:before{
background:rgba(255,0,0,0.4);
content:"";
position:absolute;
width:100%;
height:2.2px;
}

.cake:after{top:25%;}
.cake:before{top:45%;}

.fuego{
border-radius:100%;
position:absolute;
top:-20px;
left:50%;
margin-left:-2.6px;
width:6.6px;
height:18px;
}

.fuego:nth-child(1){animation:fuego 2s infinite;}
.fuego:nth-child(2){animation:fuego 1.5s infinite;}
.fuego:nth-child(3){animation:fuego 1s infinite;}
.fuego:nth-child(4){animation:fuego 0.5s infinite;}
.fuego:nth-child(5){animation:fuego 0.2s infinite;}

@keyframes fuego{
0%,100%{
background:rgba(254,248,97,0.5);
box-shadow:0 0 40px 10px rgba(248,233,209,0.2);
transform:translateY(0) scale(1);
}
50%{
background:rgba(255,50,0,0.1);
box-shadow:0 0 40px 20px rgba(248,233,209,0.2);
transform:translateY(-20px) scale(0);
}
}

@keyframes in{
to{transform:translateY(0);}
}

.text{
color:#8b6a60;
font-family:'Lato',sans-serif;
font-style:italic;
text-align:center;
}

.text h1{font-size:1.4em}

.nextPage{
margin-top:40px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

/* ---------------- PAGE 2 ---------------- */

#page2{
background:linear-gradient(#87cefa,#bde9ff);
display:none;
overflow:hidden;
}

.hearts{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{opacity:1;}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

.slider{
position:relative;
width:400px;
aspect-ratio:4/5;
overflow:hidden;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.slides{
display:flex;
height:100%;
transition:transform 0.6s ease;
}

.slide{
min-width:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* FIXED IMAGE FITTING */

.slide img,
.slide video{
width:100%;
height:100%;
object-fit:contain;
display: block;
aspect-ratio:4/5;
}

button.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:10px 16px;
cursor:pointer;
font-size:20px;
border-radius:8px;
}

.prev{ left:10px }
.next{ right:10px }

.dots{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.dot{
height:12px;
width:12px;
margin:5px;
background:#bbb;
border-radius:50%;
display:inline-block;
cursor:pointer;
transition:0.3s;
}

.dot.active{
background:white;
transform:scale(1.3);
}

/* ---------------- PAGE 3 ---------------- */

#page3{
display:none;
background:linear-gradient(180deg,#ffd6e7,#ffc0cb);
overflow:hidden;
}

.grass{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:
radial-gradient(circle at 10% 100%,#66bb6a 40%,transparent 41%),
radial-gradient(circle at 30% 100%,#43a047 40%,transparent 41%),
radial-gradient(circle at 50% 100%,#66bb6a 40%,transparent 41%),
radial-gradient(circle at 70% 100%,#43a047 40%,transparent 41%),
radial-gradient(circle at 90% 100%,#66bb6a 40%,transparent 41%);
background-size:200px 120px;
}

.card{
width:520px;
padding:45px;
background:white;
border-radius:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
animation:cardPop 1s ease;
}

@keyframes cardPop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.card h1{
font-family:'Playfair Display',serif;
font-size:38px;
color:#c2185b;
margin-bottom:25px;
}

.card p{
font-family:'Great Vibes',cursive;
font-size:28px;
color:#444;
line-height:1.6;
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page">

<div class="cake">
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
<div class="fuego"></div>
</div>

<svg id="cake" width="200" height="500">
<rect x="10" y="475" fill="#fefae9" width="180" height="4"/>
</svg>

<div class="text">
<h1>Happy Birthday!</h1>
<p class="name">Mayuri</p>
</div>

<button class="nextPage" onclick="nextPage()">Next ➜</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="hearts">
<div class="heart" style="left:10%;animation-delay:0s;">❤</div>
<div class="heart" style="left:25%;animation-delay:2s;">❤</div>
<div class="heart" style="left:40%;animation-delay:4s;">❤</div>
<div class="heart" style="left:55%;animation-delay:1s;">❤</div>
<div class="heart" style="left:70%;animation-delay:3s;">❤</div>
<div class="heart" style="left:85%;animation-delay:5s;">❤</div>
</div>

<div class="slider">

<div class="slides" id="slides">

<div class="slide"><video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video></div>

<div class="slide"><img src="img3.jpeg"></div>
<div class="slide"><img src="img4.jpeg"></div>
<div class="slide"><img src="img1.jpeg"></div>
<div class="slide"><img src="img2.jpeg"></div>

</div> 

<button class="nav prev" onclick="prevSlide()">❮</button>
<button class="nav next" onclick="nextSlide()">❯</button>

<div class="dots">
<span class="dot" onclick="goSlide(0)"></span>
<span class="dot" onclick="goSlide(1)"></span>
<span class="dot" onclick="goSlide(2)"></span>
<span class="dot" onclick="goSlide(3)"></span>
<span class="dot" onclick="goSlide(4)"></span>
</div>

</div>

<button class="nextPage" onclick="nextPage2()">Next ➜</button>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<div class="grass"></div>

<div class="card">
<h1>Once Again Happiest Birthday Mayuri ❤️</h1>

<p>
You said that you don’t like gifts from friends,
so I planned a little birthday surprise like this.
Something simple… but made specially for you.
</p>

</div>

</div>

<script>

function nextPage(){
document.getElementById("page1").style.display="none"
document.getElementById("page2").style.display="flex"
}

function nextPage2(){
document.getElementById("page2").style.display="none"
document.getElementById("page3").style.display="flex"
}

let index = 0
const slides = document.getElementById("slides")
const dots = document.querySelectorAll(".dot")

function showSlide(){
slides.style.transform="translateX(" + (-index*100) + "%)"
dots.forEach(dot=>dot.classList.remove("active"))
dots[index].classList.add("active")
}

function nextSlide(){
index++
if(index>4){index=0}
showSlide()
}

function prevSlide(){
index--
if(index<0){index=4}
showSlide()
}

function goSlide(n){
index=n
showSlide()
}

showSlide()

for(let i=0;i<30;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=4+Math.random()*6+"s"
heart.style.fontSize=15+Math.random()*25+"px"
document.body.appendChild(heart)
}

</script>

</body>
</html>
