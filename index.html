<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

@import url(https://fonts.googleapis.com/css?family=Lato:300italic);

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
font-family:Arial;
}

/* pages */

.page{
width:100%;
height:100vh;
position:absolute;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* ---------------- PAGE 1 ---------------- */

#page1{
background:#ee9ca7;
}

/* CAKE AREA */

.cake{
position:relative;
width:240px;
height:180px;
}

/* LAYERS */

.layer{
position:absolute;
left:50%;
transform:translateX(-50%);
height:20px;
border-radius:14px;
opacity:0;
box-shadow:0 6px 0 rgba(0,0,0,0.1);
}

.layer1{
width:210px;
background:#ffe5ec;
bottom:0;
animation:drop 1s forwards;
animation-delay:.5s;
}

.layer2{
width:180px;
background:#ffc2d1;
bottom:25px;
animation:drop 1s forwards;
animation-delay:1.2s;
}

.layer3{
width:150px;
background:#ffb3c6;
bottom:50px;
animation:drop 1s forwards;
animation-delay:1.9s;
}

.layer4{
width:120px;
background:#ff8fab;
bottom:75px;
animation:drop 1s forwards;
animation-delay:2.6s;
}

@keyframes drop{

0%{
transform:translate(-50%,-250px);
opacity:0;
}

100%{
transform:translate(-50%,0);
opacity:1;
}

}

/* CANDLE */

.candle{
position:absolute;
width:7px;
height:38px;
background:white;
left:50%;
transform:translateX(-50%);
bottom:95px;
border-radius:3px;
opacity:0;
animation:candleDrop 1s forwards;
animation-delay:3.6s;
}

.candle:before,
.candle:after{
content:"";
position:absolute;
width:100%;
height:3px;
background:#ff8fa3;
}

.candle:before{top:10px;}
.candle:after{top:20px;}

@keyframes candleDrop{

0%{
transform:translate(-50%,-250px);
opacity:0;
}

100%{
transform:translate(-50%,0);
opacity:1;
}

}

/* FLAME */

.flame{
position:absolute;
width:10px;
height:18px;
background:orange;
border-radius:50%;
top:-18px;
left:50%;
transform:translateX(-50%);
animation:flicker .6s infinite alternate;
animation-delay:4.6s;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(.8);}
}

/* TEXT */

.text{
margin-top:60px;
font-size:40px;
color:#8b6a60;
font-style:italic;
display:flex;
flex-direction:column;
align-items:center;
}

.line1{
display:flex;
gap:4px;
}

.line2{
display:flex;
gap:4px;
margin-top:10px;
}

/* LETTER ANIMATION */

.letter{
opacity:0;
animation:fade 1s forwards;
}

@keyframes fade{

0%{
opacity:0;
transform:translateY(20px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* LETTER DELAYS */

.letter:nth-child(1){animation-delay:5s}
.letter:nth-child(2){animation-delay:5.1s}
.letter:nth-child(3){animation-delay:5.2s}
.letter:nth-child(4){animation-delay:5.3s}
.letter:nth-child(5){animation-delay:5.4s}
.letter:nth-child(6){animation-delay:5.5s}
.letter:nth-child(7){animation-delay:5.6s}
.letter:nth-child(8){animation-delay:5.7s}
.letter:nth-child(9){animation-delay:5.8s}
.letter:nth-child(10){animation-delay:5.9s}
.letter:nth-child(11){animation-delay:6s}
.letter:nth-child(12){animation-delay:6.1s}
.letter:nth-child(13){animation-delay:6.2s}
.letter:nth-child(14){animation-delay:6.3s}
.letter:nth-child(15){animation-delay:6.4s}
.letter:nth-child(16){animation-delay:6.5s}
.letter:nth-child(17){animation-delay:6.6s}
.letter:nth-child(18){animation-delay:6.7s}
.letter:nth-child(19){animation-delay:6.8s}
.letter:nth-child(20){animation-delay:6.9s}
.letter:nth-child(21){animation-delay:7s}
.letter:nth-child(22){animation-delay:7.1s}
.letter:nth-child(23){animation-delay:7.2s}

/* ---------------- PAGE 2 ---------------- */

#page2{
background:linear-gradient(#87cefa,#bde9ff);
display:none;
overflow:hidden;
}

.hearts{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{opacity:1;}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

.slider{
position:relative;
width:90%;
max-width:400px;
aspect-ratio:4/5;
overflow:hidden;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.slides{
display:flex;
height:100%;
transition:transform 0.6s ease;
}

.slide{
min-width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide img,
.slide video{
width:100%;
height:100%;
object-fit:contain;
}

button.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:10px 16px;
cursor:pointer;
font-size:20px;
border-radius:8px;
}

.prev{left:10px}
.next{right:10px}

.dots{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.dot{
height:12px;
width:12px;
margin:5px;
background:#bbb;
border-radius:50%;
display:inline-block;
cursor:pointer;
transition:0.3s;
}

.dot.active{
background:white;
transform:scale(1.3);
}

/* ---------------- PAGE 3 ---------------- */

#page3{
display:none;
background:linear-gradient(180deg,#ffd6e7,#ffc0cb);
overflow:hidden;
}

.grass{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:
radial-gradient(circle at 10% 100%,#66bb6a 40%,transparent 41%),
radial-gradient(circle at 30% 100%,#43a047 40%,transparent 41%),
radial-gradient(circle at 50% 100%,#66bb6a 40%,transparent 41%),
radial-gradient(circle at 70% 100%,#43a047 40%,transparent 41%),
radial-gradient(circle at 90% 100%,#66bb6a 40%,transparent 41%);
background-size:200px 120px;
}

.card{
width:90%;
max-width:420px;
padding:25px;
background:white;
border-radius:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
animation:cardPop 1s ease;
}

@keyframes cardPop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.card h1{
font-family:'Playfair Display',serif;
font-size:32px;
color:#c2185b;
margin-bottom:20px;
}

.card p{
font-family:'Great Vibes',cursive;
font-size:22px;
color:#444;
line-height:1.6;
}

.nextPage{
margin-top:40px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<audio id="music" loop preload="auto">
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<div id="page1" class="page">

<div class="cake">

<div class="layer layer4"></div>
<div class="layer layer3"></div>
<div class="layer layer2"></div>
<div class="layer layer1"></div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

<div class="text">

<div class="line1">
<span class="letter">H</span>
<span class="letter">a</span>
<span class="letter">p</span>
<span class="letter">p</span>
<span class="letter">i</span>
<span class="letter">e</span>
<span class="letter">s</span>
<span class="letter">t</span>

<span class="letter"> </span>

<span class="letter">B</span>
<span class="letter">i</span>
<span class="letter">r</span>
<span class="letter">t</span>
<span class="letter">h</span>
<span class="letter">d</span>
<span class="letter">a</span>
<span class="letter">y</span>
</div>

<div class="line2">
<span class="letter">M</span>
<span class="letter">a</span>
<span class="letter">y</span>
<span class="letter">u</span>
<span class="letter">r</span>
<span class="letter">i</span>
</div>

</div>

<button class="nextPage" onclick="nextPage()">Next ➜</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="hearts">
<div class="heart" style="left:10%;animation-delay:0s;">❤</div>
<div class="heart" style="left:25%;animation-delay:2s;">❤</div>
<div class="heart" style="left:40%;animation-delay:4s;">❤</div>
<div class="heart" style="left:55%;animation-delay:1s;">❤</div>
<div class="heart" style="left:70%;animation-delay:3s;">❤</div>
<div class="heart" style="left:85%;animation-delay:5s;">❤</div>
</div>


<div class="slider">

<div class="slides" id="slides">

<div class="slide">
<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<div class="slide"><img src="img3.jpeg"></div>
<div class="slide"><img src="img4.jpeg"></div>
<div class="slide"><img src="img1.jpeg"></div>
<div class="slide"><img src="img2.jpeg"></div>

</div>

<button class="nav prev" onclick="prevSlide()">❮</button>
<button class="nav next" onclick="nextSlide()">❯</button>

<div class="dots">
<span class="dot" onclick="goSlide(0)"></span>
<span class="dot" onclick="goSlide(1)"></span>
<span class="dot" onclick="goSlide(2)"></span>
<span class="dot" onclick="goSlide(3)"></span>
<span class="dot" onclick="goSlide(4)"></span>
</div>

</div>

<button class="nextPage" onclick="nextPage2()">Next ➜</button>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<div class="grass"></div>

<div class="card">
<h1>Once Again Happiest Birthday Mayuri ❤️</h1>

<p>
You said that you don’t like gifts from friends,
so I planned a little birthday surprise like this.
Something simple… but made specially for you.
</p>

</div>

</div>

<script>

function nextPage(){
document.getElementById("page1").style.display="none"
document.getElementById("page2").style.display="flex"
}

function nextPage2(){
document.getElementById("page2").style.display="none"
document.getElementById("page3").style.display="flex"
}

let index=0
const slides=document.getElementById("slides")
const dots=document.querySelectorAll(".dot")

function showSlide(){
slides.style.transform="translateX(" + (-index*100) + "%)"
dots.forEach(dot=>dot.classList.remove("active"))
dots[index].classList.add("active")
}

function nextSlide(){
index++
if(index>4){index=0}
showSlide()
}

function prevSlide(){
index--
if(index<0){index=4}
showSlide()
}

function goSlide(n){
index=n
showSlide()
}

showSlide()

for(let i=0;i<30;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=4+Math.random()*6+"s"
heart.style.fontSize=15+Math.random()*25+"px"
document.body.appendChild(heart)
}


showSlide()

const music = document.getElementById("music")

function startMusic(){
music.play().catch(()=>{})
document.removeEventListener("click", startMusic)
}

document.addEventListener("click", startMusic)

</script>

</body>
</html>
